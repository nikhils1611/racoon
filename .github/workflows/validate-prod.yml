

name: Deploy delta to main on merge

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Salesforce

    steps:
      # 1. Checkout full history (needed for delta comparison)
      - name: Checkout source code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: ">=16"
          check-latest: true

      # 3. Install Salesforce CLI + Delta Plugin
      - name: Install Salesforce CLI
        run: |
          npm install @salesforce/cli --global
          echo y | sf plugins install sfdx-git-delta

      # 4. Fetch all branches for delta comparison
      - name: Git Fetch
        run: |
          git config remote.origin.fetch '+refs/heads/*:refs/remotes/origin/*'
          git fetch --all

      # 5. Generate delta package (PR head vs main base)
      - name: Generate DIFF Package
        run: |
          sf sgd source delta \
            --to HEAD \
            --from origin/main \
            --output . \
            $([ -f .gitignore ] && echo "--ignore .gitignore" || true)

      # 6. Display package.xml for debug visibility
      - name: Display Package XML
        run: cat package/package.xml

      # 7. Convert to metadata format
      - name: Convert to Metadata
        run: sf project convert source -x package/package.xml -d convert

      # 8. Check whether package contains Apex
      - name: Check for Apex in package
        id: check_apex
        run: |
          if grep -qE "<name>ApexClass</name>|<name>ApexTrigger</name>" package/package.xml; then
            echo "apex_present=true" >> $GITHUB_OUTPUT
          else
            echo "apex_present=false" >> $GITHUB_OUTPUT
          fi

      # 9. Extract only non-test Apex class names
      - name: Get changed Apex classes
        id: changed_apex
        run: |
          CLASS_NAMES=$(python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse('package/package.xml')
          ns = {'sf': 'http://soap.sforce.com/2006/04/metadata'}
          classes = []
          for t in tree.findall('sf:types', ns):
              name = t.find('sf:name', ns)
              if name is not None and name.text == 'ApexClass':
                  for m in t.findall('sf:members', ns):
                      if not m.text.endswith('Test'):
                          classes.append(m.text)
          print('\n'.join(classes))
          EOF
          )

          if [ -z "$CLASS_NAMES" ]; then
            echo "classes=" >> $GITHUB_OUTPUT
            echo "class_count=0" >> $GITHUB_OUTPUT
          else
            COUNT=$(echo "$CLASS_NAMES" | grep -c .)
            echo "classes=$(echo $CLASS_NAMES | tr '\n' ' ')" >> $GITHUB_OUTPUT
            echo "class_count=$COUNT" >> $GITHUB_OUTPUT
          fi

      # 10. Map each non-test class to its expected test class name
      - name: Map Apex classes to test classes
        id: map_tests
        run: |
          TEST_CLASSES=""
          for cls in ${{ steps.changed_apex.outputs.classes }}; do
            TEST_CLASSES="$TEST_CLASSES ${cls}Test"
          done
          TEST_CLASSES="${TEST_CLASSES# }"
          echo "mapped_tests=$TEST_CLASSES" >> $GITHUB_OUTPUT

      # 11. Validate that each mapped test class actually exists in the repo
      - name: Validate test classes exist
        id: validate_tests
        run: |
          VALID_COUNT=0
          VALID_TESTS=""

          for test in ${{ steps.map_tests.outputs.mapped_tests }}; do
            if find force-app -name "${test}.cls" | grep -q .; then
              VALID_TESTS="$VALID_TESTS $test"
              VALID_COUNT=$((VALID_COUNT + 1))
            fi
          done

          VALID_TESTS="${VALID_TESTS# }"
          echo "valid_tests=$VALID_TESTS" >> $GITHUB_OUTPUT
          echo "valid_count=$VALID_COUNT" >> $GITHUB_OUTPUT

      # 12. Authenticate to Salesforce org
      - name: Populate auth file
        run: echo "${{ secrets.SF_AUTH_URL }}" > ./SF_AUTH_URL.txt

      - name: Authenticate org
        run: sf org login sfdx-url -f ./SF_AUTH_URL.txt -a sitorg -d

      # 13. Clean up auth file immediately after use
      - name: Remove auth file
        if: always()
        run: rm -f ./SF_AUTH_URL.txt

      # 14. Smart deploy
      - name: Deploy delta package
        run: |
          if [ "${{ steps.check_apex.outputs.apex_present }}" = "true" ]; then
            TOTAL=${{ steps.changed_apex.outputs.class_count }}
            VALID=${{ steps.validate_tests.outputs.valid_count }}

            if [ "$TOTAL" -gt 0 ] && [ "$TOTAL" -eq "$VALID" ]; then
              echo "All $TOTAL test class(es) found — running specified tests"
              sf project deploy start \
                --metadata-dir convert \
                --test-level RunSpecifiedTests \
                --tests "${{ steps.validate_tests.outputs.valid_tests }}" \
                -w 60 -o sitorg --verbose
            else
              echo "Missing test classes ($VALID/$TOTAL found) — running all local tests"
              sf project deploy start \
                --metadata-dir convert \
                --test-level RunLocalTests \
                -w 60 -o sitorg --verbose
            fi
          else
            echo "No Apex in package — skipping tests"
            sf project deploy start \
              --metadata-dir convert \
              --test-level NoTestRun \
              -w 60 -o sitorg --verbose
          fi