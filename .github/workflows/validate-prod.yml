name: Deploy delta to main on merge

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Salesforce

    steps:
      # 1. Checkout full history (needed for delta comparison)
      - name: Checkout source code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: ">=16"
          check-latest: true

      # 3. Install Salesforce CLI + Delta Plugin
      - name: Install Salesforce CLI
        run: |
          npm install @salesforce/cli --global
          echo y | sf plugins install sfdx-git-delta

      # 4. Fetch all branches for delta comparison
      - name: Git Fetch
        run: |
          git config remote.origin.fetch '+refs/heads/*:refs/remotes/origin/*'
          git fetch --all

      # 5. Generate delta package (PR head vs main base)
      - name: Generate DIFF Package
        run: |
          sf sgd source delta \
            --to HEAD \
            --from origin/main \
            --output . \
            $([ -f .gitignore ] && echo "--ignore .gitignore" || true)

      # 6. Display package.xml for debug visibility
      - name: Display Package XML
        run: cat package/package.xml

      # 7. Convert to metadata format
      - name: Convert to Metadata
        run: sf project convert source -x package/package.xml -d convert

      # 8. Check whether package contains Apex
      - name: Check for Apex in package
        id: check_apex
        run: |
          if grep -qE "<name>ApexClass</name>|<name>ApexTrigger</name>" package/package.xml; then
            echo "apex_present=true" >> $GITHUB_OUTPUT
          else
            echo "apex_present=false" >> $GITHUB_OUTPUT
          fi

      # 9. Collect all test classes: from PR directly + mapped from changed Apex classes
      - name: Resolve test classes
        id: find_tests
        run: |

          # ── 0. Validate JSON ──────────────────────────────────────────────
          if [ ! -f test-mapping.json ]; then
            echo "❌ ERROR: test-mapping.json not found in repo root"
            exit 1
          fi

          echo "📄 test-mapping.json:"
          cat test-mapping.json

          # ── 1. All .cls files changed in this PR ──────────────────────────
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | grep -E '\.cls$' || true)
          echo ""
          echo "🔍 Changed .cls files:"
          echo "${CHANGED_FILES:-(none)}"

          # ── 2. Split into Apex classes vs test classes already in PR ──────
          PR_TEST_CLASSES=""
          PR_APEX_CLASSES=""

          while IFS= read -r filepath; do
            [ -z "$filepath" ] && continue

            if grep -qi "@isTest" "$filepath" 2>/dev/null; then
              classname=$(basename "$filepath" .cls)
              PR_TEST_CLASSES="$PR_TEST_CLASSES $classname"
              echo "   📋 PR test class: $classname"
            else
              classname=$(basename "$filepath" .cls)
              PR_APEX_CLASSES="$PR_APEX_CLASSES $classname"
              echo "   🔧 PR apex class: $classname"
            fi
          done <<< "$CHANGED_FILES"

          echo ""
          echo "PR Apex classes  : ${PR_APEX_CLASSES:-(none)}"
          echo "PR Test classes  : ${PR_TEST_CLASSES:-(none)}"

          # ── 3. For each changed Apex class, find mapped test class ────────
          MAPPED_TESTS=""

          for apexclass in $PR_APEX_CLASSES; do
            MAPPED=$(jq -r --arg cls "$apexclass" \
              '.testMappings[] | select(.apexClass == $cls) | .testClass' \
              test-mapping.json)

            if [ -z "$MAPPED" ]; then
              echo "   ℹ️  No mapping found for: $apexclass"
              continue
            fi

            echo "   🔗 $apexclass → $MAPPED"



            # ── 5. Only add if NOT already in PR test classes ───────────────
            if echo "$PR_TEST_CLASSES" | grep -qw "$MAPPED"; then
              echo "   ✅ '$MAPPED' already in PR — skipping (no duplicate)"
            else
              echo "   ➕ '$MAPPED' not in PR — adding to test run"
              MAPPED_TESTS="$MAPPED_TESTS $MAPPED"
            fi
          done

          # ── 6. Merge PR test classes + mapped additions, deduplicate ──────
          ALL_TESTS=$(echo "$PR_TEST_CLASSES $MAPPED_TESTS" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)

          TOTAL=$(echo "$ALL_TESTS" | wc -w | xargs)

          echo ""
          echo "==========================================="
          echo "📊 Summary"
          echo "==========================================="
          echo "From PR (test classes)  : ${PR_TEST_CLASSES:-(none)}"
          echo "Added from mapping      : ${MAPPED_TESTS:-(none)}"
          echo "Final deduplicated list : ${ALL_TESTS:-(none)}"
          echo "Total test classes      : $TOTAL"

          echo "valid_tests=$ALL_TESTS" >> $GITHUB_OUTPUT
          echo "valid_count=$TOTAL" >> $GITHUB_OUTPUT

      # 10. Authenticate to Salesforce org
      - name: Populate auth file
        run: echo "${{ secrets.SF_AUTH_URL }}" > ./SF_AUTH_URL.txt

      - name: Authenticate org
        run: sf org login sfdx-url -f ./SF_AUTH_URL.txt -a sitorg -d

      # 11. Clean up auth file immediately after use
      - name: Remove auth file
        if: always()
        run: rm -f ./SF_AUTH_URL.txt

      # 12. Smart deploy
      - name: Deploy delta package
        run: |
          if [ "${{ steps.check_apex.outputs.apex_present }}" = "true" ]; then

            VALID=${{ steps.find_tests.outputs.valid_count }}

            if [ "$VALID" -gt 0 ]; then
              echo "✅ Running with $VALID test class(es) — RunSpecifiedTests"

              TESTS_FLAGS=""
              for test in ${{ steps.find_tests.outputs.valid_tests }}; do
                TESTS_FLAGS="$TESTS_FLAGS --tests $test"
              done

              sf project deploy start \
                --metadata-dir convert \
                --test-level RunSpecifiedTests \
                $TESTS_FLAGS \
                -w 60 -o sitorg --verbose

            else
              echo "⚠️ No test classes found (none in PR, none mapped) — RunLocalTests"

              sf project deploy start \
                --metadata-dir convert \
                --test-level RunLocalTests \
                -w 60 -o sitorg --verbose
            fi

          else
            echo "✅ No Apex — skipping tests"

            sf project deploy start \
              --metadata-dir convert \
              --test-level NoTestRun \
              -w 60 -o sitorg --verbose
          fi