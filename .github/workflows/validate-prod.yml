            #echo "Apex found → Running tests"
            #sf project deploy start --metadata-dir convert --test-level NoTestRun -w 60 -o sitorg --verbose
          #else
            #echo "No Apex → Skipping tests"
            #sf project deploy start --metadata-dir convert --test-level NoTestRun -w 60 -o sitorg --verbose
          #fi